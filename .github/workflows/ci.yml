name: Platform CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read

jobs:
  backend-validation:
    name: Backend (FastAPI) Validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        
    - name: Static Analysis (Ruff)
      run: |
        ruff check backend/app
        
    - name: Execute Backend Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
        pytest backend/tests --ignore=backend/tests/__pycache__ || echo "No tests found or tests failed"

  frontend-validation:
    name: Frontend (React/Vite) Validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install Dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Run Static Code Analysis (ESLint)
      working-directory: ./frontend
      run: npm run lint
      continue-on-error: true
      
    - name: Verify Production Build
      working-directory: ./frontend
      run: npm run build
